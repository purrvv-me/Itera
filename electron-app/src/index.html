<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Itera</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <div class="browser-shell">
      <header class="topbar">
        <div class="brand" aria-label="Itera">
          <img src="../assets/logo.svg" alt="">
        </div>
        <nav class="controls" aria-label="Browser controls">
          <button id="backButton" title="Back" aria-label="Back">‹</button>
          <button id="forwardButton" title="Forward" aria-label="Forward">›</button>
          <button id="reloadButton" title="Reload" aria-label="Reload">↻</button>
        </nav>
        <form id="addressForm" class="address" autocomplete="off">
          <input id="addressInput" spellcheck="false" aria-label="Address" placeholder="Search or enter address">
        </form>
        <div class="session-state" title="Temporary identity active"></div>
      </header>
      <webview id="browserView" allowpopups></webview>
    </div>
    <script src="renderer.js"></script>
  </body>
</html>
