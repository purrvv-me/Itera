<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <title>Itera Match Icon</title>
  <defs>
    <linearGradient id="stick" x1="256" y1="180" x2="256" y2="438" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFF3D4"/>
      <stop offset="0.55" stop-color="#F7D28E"/>
      <stop offset="1" stop-color="#D89A46"/>
    </linearGradient>

    <linearGradient id="stickEdge" x1="244" y1="190" x2="268" y2="438" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#7A3A16" stop-opacity="0.55"/>
      <stop offset="0.5" stop-color="#A8662D" stop-opacity="0.25"/>
      <stop offset="1" stop-color="#5A2C12" stop-opacity="0.45"/>
    </linearGradient>

    <radialGradient id="head" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(256 173) rotate(90) scale(34 25)">
      <stop offset="0" stop-color="#101010"/>
      <stop offset="0.45" stop-color="#34251B"/>
      <stop offset="0.78" stop-color="#8A4E21"/>
      <stop offset="1" stop-color="#C98634"/>
    </radialGradient>

    <linearGradient id="flameOuter" x1="256" y1="57" x2="256" y2="196" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFB55A"/>
      <stop offset="0.45" stop-color="#FF6F18"/>
      <stop offset="1" stop-color="#A3340B"/>
    </linearGradient>

    <linearGradient id="flameInner" x1="256" y1="115" x2="256" y2="190" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFF6B8"/>
      <stop offset="0.55" stop-color="#FFC14D"/>
      <stop offset="1" stop-color="#F06B16"/>
    </linearGradient>

    <filter id="softGlow" x="168" y="20" width="176" height="220" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="12"/>
    </filter>
  </defs>

  <!-- subtle flame aura, still transparent background -->
  <path d="M256 52C289 105 306 134 294 174C288 195 271 210 256 210C241 210 224 195 218 174C206 134 223 105 256 52Z"
        fill="#FF8A1C" opacity="0.14" filter="url(#softGlow)"/>

  <!-- outer flame: sharp, vertical, close to the original logo silhouette -->
  <path d="M256 54C283 103 303 135 292 171C286 194 271 208 256 208C241 208 226 194 220 171C209 135 229 103 256 54Z"
        fill="url(#flameOuter)"/>

  <!-- inner flame: narrow and premium, not cartoon-like -->
  <path d="M256 116C272 143 281 162 274 181C270 193 263 200 256 200C249 200 242 193 238 181C231 162 240 143 256 116Z"
        fill="url(#flameInner)" opacity="0.92"/>

  <!-- charred match head -->
  <path d="M239 170C239 150 246 137 256 137C266 137 273 150 273 170C273 191 266 205 256 205C246 205 239 191 239 170Z"
        fill="url(#head)"/>

  <!-- elegant match stick (slimmed) -->
  <path d="M244 197C244 194.2 246.2 192 249 192H263C265.8 192 268 194.2 268 197V424C268 434.5 262.5 443 256 443C249.5 443 244 435.4 244 426V197Z"
        fill="url(#stick)"/>

  <!-- thin side shading for depth, kept minimal for UI scalability -->
  <path d="M244 197C244 194.2 246.2 192 249 192H250V425C250 433 251.5 439 254 441.5C249 442.5 244 434.8 244 426V197Z"
        fill="#FFF7DE" opacity="0.36"/>

  <path d="M244 197C244 194.2 246.2 192 249 192H263C265.8 192 268 194.2 268 197V424C268 434.5 262.5 443 256 443C249.5 443 244 435.4 244 426V197Z"
        stroke="url(#stickEdge)" stroke-width="2.2"/>

  <!-- tiny char texture, reduced so it reads clean at favicon sizes -->
  <circle cx="252" cy="162" r="2.2" fill="#0C0C0C" opacity="0.55"/>
  <circle cx="260" cy="170" r="2.5" fill="#0C0C0C" opacity="0.5"/>
  <circle cx="251" cy="180" r="1.9" fill="#0C0C0C" opacity="0.42"/>
  <circle cx="263" cy="185" r="1.7" fill="#0C0C0C" opacity="0.35"/>
</svg>
