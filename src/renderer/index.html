<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' data: https: http:;" />
  <title>ITERA</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

 <div id="screen">

  <!-- ============ Paper bookmark tabs (functional, tucked behind the window) ============ -->
  <div id="tabstrip">
    <div id="tabs"></div>
    <button id="new-tab" class="newtab" title="New tab" aria-label="New tab">
      <svg viewBox="0 0 24 24" fill="none"><path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
    </button>
  </div>

  <div id="win">

  <!-- ===================== Title bar (draggable) ===================== -->
  <div id="titlebar">
    <span class="brandmark" aria-hidden="true">
      <svg viewBox="0 0 24 24" width="15" height="15"><path d="M12 3 C9 8 6.4 10 6.4 14.4 A5.6 5.6 0 0 0 17.6 14.4 C17.6 10 15 8 12 3 Z" fill="url(#flameGrad)"/></svg>
    </span>
    <span class="brandword">itera</span>
    <div class="wctrls">
      <button id="min-btn" class="wbtn" title="Minimize" aria-label="Minimize">
        <svg viewBox="0 0 24 24" fill="none"><path d="M5 12h14" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
      </button>
      <button id="max-btn" class="wbtn" title="Maximize" aria-label="Maximize">
        <svg class="ic-max" viewBox="0 0 24 24" fill="none"><rect x="5.5" y="5.5" width="13" height="13" rx="2.5" stroke="currentColor" stroke-width="1.8"/></svg>
        <svg class="ic-restore" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M8 8 V6.5 A2 2 0 0 1 10 4.5 H17.5 A2 2 0 0 1 19.5 6.5 V14 A2 2 0 0 1 17.5 16 H16"/><rect x="4.5" y="8" width="11" height="11.5" rx="2"/></svg>
      </button>
      <button id="close-btn" class="wbtn close" title="Close &amp; wipe" aria-label="Close">
        <svg viewBox="0 0 24 24" fill="none"><path d="M6 6l12 12M18 6L6 18" stroke="currentColor" stroke-width="1.9" stroke-linecap="round"/></svg>
      </button>
    </div>
  </div>

  <!-- ======================== Toolbar ======================== -->
  <div id="chrome">
    <div class="navgrp">
      <button id="back" class="iconbtn" title="Back" aria-label="Back">
        <svg viewBox="0 0 24 24" fill="none"><path d="M15 5l-7 7 7 7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
      <button id="forward" class="iconbtn" title="Forward" aria-label="Forward">
        <svg viewBox="0 0 24 24" fill="none"><path d="M9 5l7 7-7 7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
      <button id="reload" class="iconbtn" title="Reload" aria-label="Reload">
        <svg viewBox="0 0 24 24" fill="none"><path d="M4 12a8 8 0 0 1 13.7-5.6L20 8M20 4v4h-4M20 12a8 8 0 0 1-13.7 5.6L4 16M4 20v-4h4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
    </div>

    <form id="address-form" class="omni">
      <span class="shield" title="Disposable session — protected">
        <svg viewBox="0 0 24 24" fill="none"><path d="M12 3 5 5.5V11c0 4.2 3 7.7 7 9 4-1.3 7-4.8 7-9V5.5L12 3Z" stroke="currentColor" stroke-width="1.7" stroke-linejoin="round"/><path d="m9 12 2 2 4-4" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </span>
      <input id="address" type="text" spellcheck="false" autocomplete="off" placeholder="Search or enter address" />
    </form>

    <button id="kill-session" class="kill" title="Wipe this session now and erase everything (same as closing)">
      <svg class="fl" viewBox="0 0 24 24" fill="currentColor"><path d="M13 2c4 4 5.5 7 5.5 10A6.5 6.5 0 0 1 6 12.5c0-1 .3-1.9.7-2.8.6 1.5 1.8 2.2 2.9 2.3C8.8 8.5 10.4 5 13 2Z"/></svg>
      <span>Kill session</span>
    </button>
  </div>

  <!-- ======================== Web content ======================== -->
  <div id="view">
    <!-- new-tab / home page (shown when the active tab has nothing loaded yet) -->
    <div id="newtab" class="hidden">
      <img class="nt-logo" src="assets/match.png" alt="" />
      <h1 class="nt-word">ITERA</h1>
      <p class="nt-slogan">Every launch begins again.</p>
      <form id="newtab-form" class="nt-search">
        <input id="newtab-input" type="text" spellcheck="false" autocomplete="off"
               placeholder="Search the web, or type an address" />
        <button type="submit">Begin</button>
      </form>
    </div>
  </div>

  </div><!-- /#win -->

  <!-- ===================== Burn-on-kill overlay ===================== -->
  <!-- The whole burn (charred void, clipped paper sheet, ragged fire front,
       embers, smoke, ash) is drawn here every frame by burn.js. -->
  <canvas id="burn-canvas" aria-hidden="true"></canvas>
 </div><!-- /#screen -->

  <!-- brand flame gradient (title bar + active tab favicon) -->
  <svg width="0" height="0" style="position:absolute" aria-hidden="true">
    <defs>
      <linearGradient id="flameGrad" x1="0" y1="1" x2="0" y2="0">
        <stop offset="0%" stop-color="#ff5a00"/>
        <stop offset="55%" stop-color="#ff8a1f"/>
        <stop offset="100%" stop-color="#ffd23a"/>
      </linearGradient>
    </defs>
  </svg>

  <script src="burn.js"></script>
  <script src="renderer.js"></script>
</body>
</html>
