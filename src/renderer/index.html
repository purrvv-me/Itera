<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:;" />
  <title>ITERA</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <!-- ===================== Title bar (custom, draggable) ================== -->
  <div id="titlebar">
    <div class="brand">
      <span class="brand-mark" aria-hidden="true">
        <img src="assets/match.png" alt="" style="height:22px;width:auto;display:block;" />
      </span>
      <span class="brand-name">ITERA</span>
    </div>
    <div class="win-controls">
      <button id="min-btn" class="win-btn" title="Minimize" aria-label="Minimize">&#x2013;</button>
      <button id="max-btn" class="win-btn" title="Maximize" aria-label="Maximize">
        <svg class="ic ic-max" width="11" height="11" viewBox="0 0 11 11" fill="none" stroke="currentColor" stroke-width="1.2"><rect x="0.9" y="0.9" width="9.2" height="9.2" rx="1.5"/></svg>
        <svg class="ic ic-restore" width="11" height="11" viewBox="0 0 11 11" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 1.6 H9.4 V8"/><rect x="1" y="2.6" width="7.4" height="7.4" rx="1.3"/></svg>
      </button>
      <button id="close-btn" class="win-btn close" title="Close &amp; wipe" aria-label="Close">&#x2715;</button>
    </div>
  </div>

  <!-- ===================== Tab strip (hidden until Begin) =============== -->
  <div id="tabstrip" class="hidden">
    <div id="tabs"></div>
    <button id="new-tab" class="tabstrip-btn" title="New tab" aria-label="New tab">+</button>
  </div>

  <!-- ===================== Browser chrome (hidden until Begin) =========== -->
  <div id="chrome" class="hidden">
    <button id="back" class="nav-btn" title="Back" aria-label="Back">&#x2039;</button>
    <button id="forward" class="nav-btn" title="Forward" aria-label="Forward">&#x203A;</button>
    <button id="reload" class="nav-btn" title="Reload" aria-label="Reload">&#x21bb;</button>
    <form id="address-form">
      <input id="address" type="text" spellcheck="false" autocomplete="off"
             placeholder="Search or enter address" />
    </form>
    <button id="kill-session" title="Wipe this session now and erase everything (same as closing)">
      <span class="kill-dot" aria-hidden="true"></span>Kill session
    </button>
  </div>

  <!-- ===================== Web content ================================== -->
  <div id="view">
    <!-- new-tab page: shown when the active tab has nothing loaded yet -->
    <div id="newtab" class="hidden">
      <img class="logo nt-logo" src="assets/itera_ui_match_icon.svg" width="92" height="92" alt="" />
      <p class="slogan">Every launch begins again.</p>
      <form id="newtab-form" class="begin">
        <input id="newtab-input" type="text" spellcheck="false" autocomplete="off"
               placeholder="Search the web, or type an address" />
        <button type="submit">Begin</button>
      </form>
    </div>
  </div>

  <!-- ===================== Start screen ================================= -->
  <main id="start">
    <div class="logo-wrap">
      <img class="logo" src="assets/match.png" alt="ITERA match logo" />
    </div>

    <h1 class="wordmark">ITERA</h1>
    <p class="slogan">Every launch begins again.</p>

    <form id="begin-form" class="begin">
      <input id="begin-input" type="text" spellcheck="false" autocomplete="off"
             placeholder="Search the web, or type an address" autofocus />
      <button id="begin-btn" type="submit">Begin</button>
    </form>
  </main>

  <script src="renderer.js"></script>
</body>
</html>
