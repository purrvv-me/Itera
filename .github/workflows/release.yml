name: Build & Release

# Builds the Windows installer and publishes it to a GitHub Release
# whenever a version tag (e.g. v1.0.0) is pushed.
#
#   git tag v1.0.0
#   git push origin v1.0.0
#
# You can also run it manually (Actions tab -> Run workflow) to test the
# build without creating a release.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Windows installer
        run: npx electron-builder --win --publish never

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: ITERA ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            dist/*.exe
            dist/*.exe.blockmap
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
