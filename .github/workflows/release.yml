name: Build & Release

# Builds the Windows installer. Manual only — releases are published by hand,
# never automatically. Run from the Actions tab (Run workflow) to produce a
# build artifact; pushing a tag does NOT create a release.

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Windows installer
        run: npx electron-builder --win --publish never

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: ITERA ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            dist/*.exe
            dist/*.exe.blockmap
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
